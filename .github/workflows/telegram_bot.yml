name: Telegram Bot (Polling)

on:
  schedule:
    - cron: '* * * * *'          # هر دقیقه یکبار (دقیقه، ساعت، روز، ماه، روز هفته)
  workflow_dispatch:            # برای تست دستی

jobs:
  poll:
    runs-on: ubuntu-latest
    permissions:
      contents: write           # برای ذخیره offset در ریپو
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Run bot
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}  # توکن ربات تلگرام
          GITHUB_TOKEN: ${{ secrets.GH_PAT }}            # Personal Access Token با دسترسی workflow
          GITHUB_OWNER: ${{ github.repository_owner }}
          GITHUB_REPO: ${{ github.event.repository.name }}
          WORKFLOW_FILENAME: "download.yml"
          OFFSET_FILE: "last_update_id.txt"              # فایل ذخیره‌ی آخرین update_id
        run: |
          pip install requests
          python -c "
          import os, requests, json, re, time

          TELEGRAM_TOKEN = os.environ['TELEGRAM_TOKEN']
          GITHUB_TOKEN = os.environ['GITHUB_TOKEN']
          OWNER = os.environ['GITHUB_OWNER']
          REPO = os.environ['GITHUB_REPO']
          OFFSET_FILE = os.environ['OFFSET_FILE']

          # خواندن آخرین update_id از فایل (در صورت وجود)
          offset = 0
          try:
              with open(OFFSET_FILE, 'r') as f:
                  offset = int(f.read().strip())
          except Exception:
              pass

          # دریافت آپدیت‌های جدید از تلگرام
          resp = requests.get(
              f'https://api.telegram.org/bot{TELEGRAM_TOKEN}/getUpdates',
              params={'offset': offset + 1, 'timeout': 5}
          ).json()

          if not resp.get('ok'):
              print('Error getting updates:', resp)
              exit(1)

          updates = resp['result']
          if not updates:
              print('No new updates.')
              exit(0)

          # پردازش آخرین آپدیت (برای جلوگیری از طولانی شدن اجرا فقط یکی)
          update = updates[-1]   # یا اولی – بهتر است اولین باشد
          update_id = update['update_id']

          # ذخیره کردن offset جدید
          with open(OFFSET_FILE, 'w') as f:
              f.write(str(update_id))

          # بررسی پیام متنی
          message = update.get('message')
          if not message:
              exit(0)
          text = message.get('text', '')
          chat_id = message['chat']['id']

          # یافتن لینک در متن
          urls = re.findall(r'https?://[^\s]+', text)
          if not urls:
              # پاسخ ندهیم یا یک پیام راهنما
              requests.post(f'https://api.telegram.org/bot{TELEGRAM_TOKEN}/sendMessage', json={
                  'chat_id': chat_id,
                  'text': 'لطفاً یک لینک معتبر ارسال کنید.'
              })
              exit(0)

          url = urls[0]

          # اطلاع‌رسانی به کاربر
          requests.post(f'https://api.telegram.org/bot{TELEGRAM_TOKEN}/sendMessage', json={
              'chat_id': chat_id,
              'text': 'در حال ارسال درخواست به گیتهاب...'
          })

          # پیدا کردن workflow_id
          wf_url = f'https://api.github.com/repos/{OWNER}/{REPO}/actions/workflows'
          headers = {'Authorization': f'token {GITHUB_TOKEN}'}
          wf_resp = requests.get(wf_url, headers=headers).json()
          workflow_id = None
          for wf in wf_resp['workflows']:
              if wf['path'] == f'.github/workflows/{os.environ[\"WORKFLOW_FILENAME\"]}':
                  workflow_id = wf['id']
                  break
          if not workflow_id:
              print('Workflow not found')
              exit(1)

          # dispatch
          dispatch_payload = {
              'ref': 'main',
              'inputs': {'url': url}
          }
          disp_resp = requests.post(
              f'https://api.github.com/repos/{OWNER}/{REPO}/actions/workflows/{workflow_id}/dispatches',
              json=dispatch_payload,
              headers=headers
          )
          if disp_resp.status_code != 204:
              raise Exception(f'Dispatch failed: {disp_resp.status_code}')

          # حدس نام فایل (از URL یا هدر)
          try:
              head = requests.head(url, allow_redirects=True, timeout=5)
              cd = head.headers.get('Content-Disposition', '')
              filename = None
              if cd:
                  import re as regex
                  match = regex.findall(r'filename\*?=(?:UTF-8\'\')?[\"']?([^\"';\s]+)', cd)
                  if match:
                      from urllib.parse import unquote
                      filename = unquote(match[0])
              if not filename:
                  from urllib.parse import urlparse, unquote
                  filename = unquote(urlparse(url).path.split('/')[-1]) or 'downloaded_file'
          except:
              from urllib.parse import urlparse, unquote
              filename = unquote(urlparse(url).path.split('/')[-1]) or 'downloaded_file'

          raw_url = f'https://raw.githubusercontent.com/{OWNER}/{REPO}/main/downloads/{filename}'
          requests.post(f'https://api.telegram.org/bot{TELEGRAM_TOKEN}/sendMessage', json={
              'chat_id': chat_id,
              'text': f'فایل تا چند لحظه دیگر در دسترس خواهد بود:\n{raw_url}'
          })
          "  # پایان دستور python -c

      # ذخیره offset جدید (در صورت تغییر) و commit
      - name: Commit offset file if changed
        run: |
          if [ -n "$(git status --porcelain last_update_id.txt)" ]; then
            git config user.name "github-actions[bot]"
            git config user.email "actions@github.com"
            git add last_update_id.txt
            git commit -m "Update Telegram offset [skip ci]"
            git push
          fi
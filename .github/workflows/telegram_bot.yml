name: Telegram Bot (Hourly Long Poll)

on:
  schedule:
    - cron: '0 * * * *'         # هر ۱ ساعت
  workflow_dispatch:

concurrency:
  group: telegram-bot
  cancel-in-progress: true      # لغو اجرای قبلی و جایگزینی با جدید

jobs:
  bot:
    runs-on: ubuntu-latest
    timeout-minutes: 55         # کمی کمتر از ۶۰ دقیقه، تقریباً بدون وقفه
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'    # یا نسخه‌ی پایدار

      - name: Run Telegram Bot
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          GH_PAT: ${{ secrets.GH_PAT }}          # توکن گیتهاب با دسترسی repo
          REPO_OWNER: ${{ github.repository_owner }}
          REPO_NAME: ${{ github.event.repository.name }}
        run: go run bot.go
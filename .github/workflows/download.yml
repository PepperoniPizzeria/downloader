name: Download via Trigger File

on:
  push:
    paths:
      - 'trigger_download.txt'

jobs:
  download:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Download files
        run: go run download.go

      - name: Commit and reset trigger
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "actions@github.com"
          git add downloads/ || true
          
          # اگر چیزی تغییر کرده بود کامیت کن
          if ! git diff --cached --quiet; then
            git commit -m "Add downloaded file(s)"
          fi
          
          # بازنشانی فایل محرک و کامیت دوم با [skip ci]
          cat > trigger_download.txt << 'EOF'
# لینک‌های دانلود را در خطوط زیر وارد کنید (هر خط یک لینک)
# مثال: https://example.com/file.pdf

EOF
          git add trigger_download.txt
          git commit -m "Reset trigger file [skip ci]"
          git push